[theme]
base = "light"
font = "sans-serif"
primaryColor = "#0f766e"
showWidgetBorder = true
showSidebarBorder = true

[theme.light]
primaryColor = "#0f766e"
backgroundColor = "#f6f8fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
borderColor = "#dbe3ee"
dataframeBorderColor = "#dbe3ee"
dataframeHeaderBackgroundColor = "#f8fafc"

[theme.light.sidebar]
primaryColor = "#0f766e"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#0f172a"
borderColor = "#dbe3ee"

[theme.dark]
primaryColor = "#2dd4bf"
backgroundColor = "#0b1120"
secondaryBackgroundColor = "#111827"
textColor = "#f8fafc"
borderColor = "#334155"
dataframeBorderColor = "#334155"
dataframeHeaderBackgroundColor = "#172033"

[theme.dark.sidebar]
primaryColor = "#2dd4bf"
backgroundColor = "#111827"
secondaryBackgroundColor = "#172033"
textColor = "#f8fafc"
borderColor = "#334155"
